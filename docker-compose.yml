services:
  api:
    build:
      context: .
      args:
        APP: api
    image: askoc-api:local
    environment:
      ASKOC_HTTP_ADDR: :9080
      ASKOC_AUTH_ENABLED: "false"
      ASKOC_AUTH_TOKEN: demo-admin-token
      ASKOC_LOG_LEVEL: info
      ASKOC_PROVIDER: stub
      ASKOC_PROVIDER_MODEL: demo-placeholder
      ASKOC_BANNER_URL: http://mock-banner:9081
      ASKOC_PAYMENT_URL: http://mock-payment:9082
      ASKOC_CRM_URL: http://mock-crm:9083
      ASKOC_WORKFLOW_URL: http://workflow-sim:9084/api/v1/automation/payment-reminder
      ASKOC_WORKFLOW_TIMEOUT_SECONDS: "5"
      ASKOC_WORKFLOW_MAX_RETRIES: "1"
      ASKOC_RAG_CHUNKS_PATH: data/rag-chunks.json
    ports:
      - "${ASKOC_API_PORT:-9080}:9080"
    depends_on:
      mock-banner:
        condition: service_healthy
      mock-payment:
        condition: service_healthy
      mock-crm:
        condition: service_healthy
      workflow-sim:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  mock-banner:
    build:
      context: .
      args:
        APP: mock-banner
    image: askoc-mock-banner:local
    ports:
      - "${ASKOC_BANNER_PORT:-9081}:9081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9081/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  mock-payment:
    build:
      context: .
      args:
        APP: mock-payment
    image: askoc-mock-payment:local
    ports:
      - "${ASKOC_PAYMENT_PORT:-9082}:9082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9082/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  mock-crm:
    build:
      context: .
      args:
        APP: mock-crm
    image: askoc-mock-crm:local
    ports:
      - "${ASKOC_CRM_PORT:-9083}:9083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9083/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  workflow-sim:
    build:
      context: .
      args:
        APP: workflow-sim
    image: askoc-workflow-sim:local
    ports:
      - "${ASKOC_WORKFLOW_PORT:-9084}:9084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9084/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  mock-lms:
    build:
      context: .
      args:
        APP: mock-lms
    image: askoc-mock-lms:local
    ports:
      - "${ASKOC_LMS_PORT:-9085}:9085"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9085/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
